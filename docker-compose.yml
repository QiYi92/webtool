services:
  backend:
    build:
      context: ./backend
    container_name: galileocat-backend
    restart: unless-stopped
    env_file:
      - ./backend/.env
    environment:
      CORS_ALLOW_ORIGINS: ${FRONTEND_PUBLIC_ORIGIN:-http://localhost:3000}
    ports:
      - "8888:8888"
    healthcheck:
      test:
        [
          "CMD",
          "python",
          "-c",
          "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8888/health', timeout=3)"
        ]
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 20s

  frontend:
    build:
      context: ./frontend
      args:
        NEXT_PUBLIC_API_BASE_URL: ${NEXT_PUBLIC_API_BASE_URL:-http://127.0.0.1:8888}
    container_name: galileocat-frontend
    restart: unless-stopped
    depends_on:
      backend:
        condition: service_healthy
    ports:
      - "3000:3000"

